version: "3.8"

services:
  douyin-parser:
    image: ghcr.io/bitabc/douyin-parser:latest
    container_name: douyin-parser
    ports:
      - "8899:8899"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8899/health"]
      interval: 30s
      timeout: 5s
      retries: 2
      start_period: 10s
    environment:
      - TZ=Asia/Shanghai
    volumes:
      - douyin_cache:/tmp/douyin_cache
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"

volumes:
  douyin_cache: